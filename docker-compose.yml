services:
  foldergram:
    # build: .
    # image: ghcr.io/foldergram/foldergram:latest
    image: docker.cnb.cool/fjyaxax/docker/foldergram

    ports:
      - "4141:4141"
    environment:
      IMAGE_DETAIL_SOURCE: preview
      DERIVATIVE_MODE: eager
      #DERIVATIVE_MODE: lazy
      # Optional: skip specific source folders by name or by exact relative path.
      # GALLERY_EXCLUDED_FOLDERS: "@eaDir,thumbnails,Archive/cache"
      # Optional: enable read-only public demo behavior.
      # PUBLIC_DEMO_MODE: "1"
      # Optional when the browser-visible origin differs from the upstream Node host.
      # CSRF_TRUSTED_ORIGINS: https://foldergram.example.com
    volumes:
      # - ./data/gallery:/app/data/gallery
      # - ./data/db:/app/data/db
      # - ./data/thumbnails:/app/data/thumbnails
      # - ./data/previews:/app/data/previews

      - ./data:/app/data
      #- ../vid/:/app/data/gallery/vid
      - ../../fileb/:/app/data/gallery/fileb
      # - ../files/:/app/data/gallery/files
      - ../dec/:/app/data/gallery/dec

